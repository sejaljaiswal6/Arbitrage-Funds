
<style>
*{box-sizing:border-box;}
.wrap{padding:.75rem 0;}
.tabs{display:flex;gap:0;margin-bottom:.75rem;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);overflow:hidden;}
.tab{flex:1;padding:7px 6px;font-size:12px;font-weight:400;cursor:pointer;background:var(--color-background-secondary);color:var(--color-text-secondary);border:none;border-right:0.5px solid var(--color-border-tertiary);text-align:center;}
.tab:last-child{border-right:none;}
.tab.active{background:var(--color-background-primary);color:var(--color-text-primary);font-weight:500;}
.summary{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;margin-bottom:.75rem;}
.stat{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:8px 10px;}
.stat-label{font-size:11px;color:var(--color-text-secondary);margin-bottom:2px;}
.stat-val{font-size:16px;font-weight:500;color:var(--color-text-primary);}
.controls{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:.75rem;align-items:center;}
.controls input{flex:1;min-width:130px;font-size:12px;padding:5px 8px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-primary);}
.controls select{font-size:12px;padding:5px 7px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-primary);}
.tbl-wrap{overflow-x:auto;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);}
table{width:100%;border-collapse:collapse;font-size:12px;table-layout:fixed;}
thead th{padding:7px 8px;text-align:left;font-weight:500;font-size:11px;color:var(--color-text-secondary);border-bottom:0.5px solid var(--color-border-tertiary);background:var(--color-background-secondary);white-space:nowrap;}
tbody tr{border-bottom:0.5px solid var(--color-border-tertiary);}
tbody tr:last-child{border-bottom:none;}
tbody td{padding:6px 8px;color:var(--color-text-primary);vertical-align:middle;}
.fn{font-weight:500;font-size:12px;line-height:1.3;}
.amc{font-size:10px;color:var(--color-text-secondary);margin-top:1px;}
.badge{display:inline-block;font-size:10px;padding:1px 6px;border-radius:20px;}
.cat-arb{background:#EEEDFE;color:#3C3489;}
.cat-baf{background:#E1F5EE;color:#0F6E56;}
.cat-es{background:#FAEEDA;color:#633806;}
.tier-xl{background:#EEEDFE;color:#3C3489;}
.tier-l{background:#E1F5EE;color:#0F6E56;}
.tier-m{background:#FAEEDA;color:#633806;}
.tier-s{background:#F1EFE8;color:#444441;}
.tier-u{background:#F1EFE8;color:#888780;}
.bar-bg{background:var(--color-background-secondary);border-radius:3px;height:5px;overflow:hidden;width:60px;}
.bar-fill{height:5px;border-radius:3px;}
.b-arb{background:#7F77DD;}
.b-baf{background:#1D9E75;}
.b-es{background:#BA7517;}
.tot td{font-weight:500;background:var(--color-background-secondary);}
.na{color:var(--color-text-secondary);font-style:italic;font-size:11px;}
.note{font-size:11px;color:var(--color-text-secondary);margin-top:8px;line-height:1.5;}
.warning{font-size:11px;background:#FAEEDA;color:#633806;padding:8px 12px;border-radius:var(--border-radius-md);margin-bottom:.75rem;line-height:1.5;}
</style>
<div class="wrap">

    <option value="aum_asc">AUM: Low → High</option>

</div>
<div class="tbl-wrap">

</div>

const maxAum=Math.max(...all.filter(f=>f.aum).map(f=>f.aum));
let activeTab='all';

function tier(a){
  if(a===null) return "U";
  if(a>=30000) return "XL";
  if(a>=10000) return "L";
  if(a>=1000) return "M";
  return "S";
}
function tierBadge(t){
  const m={XL:"tier-xl",L:"tier-l",M:"tier-m",S:"tier-s",U:"tier-u"};
  const l={XL:"XL",L:"Large",M:"Mid",S:"Small",U:"Verify"};
  return `<span class="badge ${m[t]}">${l[t]}</span>`;
}
function catBadge(c){
  const m={Arbitrage:"cat-arb",BAF:"cat-baf",EquitySavings:"cat-es"};
  const l={Arbitrage:"Arb",BAF:"BAF",EquitySavings:"Eq Sav"};
  return `<span class="badge ${m[c]}">${l[c]}</span>`;
}
function barClass(c){return c==="Arbitrage"?"b-arb":c==="BAF"?"b-baf":"b-es";}

function setTab(t,el){
  activeTab=t;
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  render();
}

function render(){
  const q=document.getElementById('search').value.toLowerCase();
  const tf=document.getElementById('tier').value;
  const sf=document.getElementById('sort').value;

  let data=all.filter(f=>activeTab==='all'||f.cat===activeTab);
  if(q) data=data.filter(f=>f.name.toLowerCase().includes(q)||f.amc.toLowerCase().includes(q));
  if(tf) data=data.filter(f=>tier(f.aum)===tf);
  if(sf==='aum_asc') data.sort((a,b)=>(a.aum??-1)-(b.aum??-1));
  else if(sf==='name') data.sort((a,b)=>a.name.localeCompare(b.name));
  else if(sf==='cat') data.sort((a,b)=>a.cat.localeCompare(b.cat)||((b.aum??-1)-(a.aum??-1)));
  else data.sort((a,b)=>(b.aum??-1)-(a.aum??-1));

  const knownAum=data.filter(f=>f.aum!==null).reduce((s,f)=>s+f.aum,0);
  const unconfirmed=data.filter(f=>f.aum===null).length;
  const arbKnown=all.filter(f=>f.cat==='Arbitrage'&&f.aum!==null).reduce((s,f)=>s+f.aum,0);
  const bafKnown=all.filter(f=>f.cat==='BAF'&&f.aum!==null).reduce((s,f)=>s+f.aum,0);
  const esKnown=all.filter(f=>f.cat==='EquitySavings'&&f.aum!==null).reduce((s,f)=>s+f.aum,0);
  const grand=arbKnown+bafKnown+esKnown;

  document.getElementById('summary').innerHTML=`
    <div class="stat"><div class="stat-label">Funds shown</div><div class="stat-val">${data.length}</div></div>
    <div class="stat"><div class="stat-label"><span class="badge cat-arb">Arb</span> known AUM</div><div class="stat-val">₹${(arbKnown/100000).toFixed(2)}L Cr</div></div>
    <div class="stat"><div class="stat-label">Unconfirmed AUM</div><div class="stat-val">${unconfirmed} funds</div></div>
    <div class="stat"><div class="stat-label">Confirmed total</div><div class="stat-val">₹${(grand/100000).toFixed(2)}L Cr</div></div>
  `;

  const rows=data.map((f,i)=>{
    const t=tier(f.aum);
    const pct=f.aum?Math.round((f.aum/maxAum)*100):0;
    const aumCell=f.aum!==null
      ?`<td style="text-align:right;font-weight:500">₹${f.aum.toLocaleString()}</td>`
      :`<td style="text-align:right"><span class="na">— verify</span></td>`;
    const barCell=f.aum
      ?`<td><div class="bar-bg"><div class="bar-fill ${barClass(f.cat)}" style="width:${pct}%"></div></div></td>`
      :`<td></td>`;
    return `<tr>
      <td style="color:var(--color-text-secondary);font-size:11px">${i+1}</td>
      <td><div class="fn">${f.name}</div><div class="amc">${f.amc}</div></td>
      <td>${catBadge(f.cat)}</td>
      ${aumCell}
      ${barCell}
      <td>${tierBadge(t)}</td>
    </tr>`;
  }).join('');

  const totRow=`<tr class="tot">
    <td></td>
    <td>Confirmed AUM (${data.filter(f=>f.aum).length} funds)</td>
    <td></td>
    <td style="text-align:right">₹${knownAum.toLocaleString()}</td>
    <td></td><td></td>
  </tr>`;

  document.getElementById('tbody').innerHTML=rows+totRow;
  document.getElementById('foot').textContent=`Arbitrage tab now shows all 39 AMFI-registered arbitrage funds. 13 funds marked "verify" exist per AMC scheme lists and INDmoney category data but individual AUM was not available from the sources searched — these are mostly very small/new funds. AUM data for confirmed funds is as of Feb–Mar 2026. BAF and Equity Savings remain unchanged from previous search.`;
}
render();
</script>
